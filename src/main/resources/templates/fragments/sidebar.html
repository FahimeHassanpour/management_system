<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<body>

<div th:fragment="sidebar(active)">
    <aside class="sidebar">

        <nav class="menu">
            <a th:href="${#authorization.expression('hasAnyRole(''MANAGER'',''ADMIN'')')} ? @{/admin/passwords} : @{/my/passwords}"
               th:text="${#authorization.expression('hasAnyRole(''MANAGER'',''ADMIN'')')} ? 'Manage passwords' : 'My assigned passwords'"
               th:classappend="${active == 'passwords'} ? 'active'"
               class="nav-link">
                My assigned passwords
            </a>

            <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
               th:href="@{/admin/categories}"
               th:classappend="${active == 'categories'} ? 'active'"
               class="nav-link">
                Password categories
            </a>

            <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
               th:href="@{/admin/users}"
               th:classappend="${active == 'users'} ? 'active'"
               class="nav-link">
                User management
            </a>

            <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
               th:href="@{/admin/audit}"
               th:classappend="${active == 'audit'} ? 'active'"
               class="nav-link">
                Audit logs
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','MANAGER')"
               th:href="@{/admin/reports/user-access}"
               th:classappend="${active == 'reports'} ? 'active'"
               class="nav-link">
                Reports
            </a>

        </nav>

        <div class="sidebar-bottom">
            <div class="profile-popup-wrapper">

                <button type="button"
                        class="theme-btn dark-theme-btn profile-icon-btn"
                        aria-haspopup="true"
                        aria-expanded="false">

                    <img th:if="${sidebarUser?.profileImage != null}"
                         th:src="@{'/uploads/profile-images/' + ${sidebarUser.profileImage}}"
                         alt="Profile"
                         class="profile-btn-photo"/>

                    <span th:unless="${sidebarUser?.profileImage != null}"
                          class="profile-btn-initials"
                          th:text="${sidebarInitials}">?</span>
                </button>
                <div class="profile-popup"
                     aria-hidden="true">

                    <a href="/profile"
                       target="contentFrame"
                       class="popup-item">
                        Profile Settings
                    </a>

                    <form th:action="@{/logout}"
                          method="post">

                        <button type="submit"
                                class="popup-item logout-item">

                            Logout

                        </button>

                    </form>

                </div>

            </div>
            <div class="theme-switch">
                <button type="button"
                        class="theme-btn"
                        onclick="toggleTheme()"
                        id="themeToggle">
                    🌙
                </button>
            </div>
        </div>

    </aside>
    <script>
        (function () {
            function initProfilePopup() {
                var wrapper = document.querySelector('.profile-popup-wrapper');
                if (!wrapper) return;
                var toggle = wrapper.querySelector('.profile-icon-btn');
                var popup = wrapper.querySelector('.profile-popup');

                if (!wrapper || !toggle || !popup) return;
                if (wrapper.dataset.profilePopupInit === 'true') return;
                wrapper.dataset.profilePopupInit = 'true';

                function closePopup() {
                    popup.classList.remove('show');
                    popup.setAttribute('aria-hidden', 'true');
                    toggle.setAttribute('aria-expanded', 'false');
                }

                function openPopup() {
                    popup.classList.add('show');
                    popup.setAttribute('aria-hidden', 'false');
                    toggle.setAttribute('aria-expanded', 'true');
                }

                toggle.addEventListener('click', function (event) {
                    event.stopPropagation();
                    if (popup.classList.contains('show')) {
                        closePopup();
                        return;
                    }
                    openPopup();
                });

                document.addEventListener('click', function (event) {
                    if (!wrapper.contains(event.target)) {
                        closePopup();
                    }
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initProfilePopup);
            } else {
                initProfilePopup();
            }
        })();
    </script>
</div>

</body>
</html>
