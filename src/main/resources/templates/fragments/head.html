<head th:fragment="commonHead(title)" xmlns:th="http://www.thymeleaf.org">
    <!-- Pages must use th:replace="fragments/head :: commonHead(#{...})" — fragment name is commonHead(title). -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title : 'Password Vault'}">Password Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@v4.0.0-alpha7/dist/htmx.min.js" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof htmx !== 'undefined') htmx.config.implicitInheritance = true;
        });
    </script>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.5.0/dist/styles/webawesome.css"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"
          crossorigin="anonymous">
    <script src="https://kit.webawesome.com/a317929e80b2446d.js" crossorigin="anonymous"></script>
    <style>
        /* Colors only via Web Awesome tokens (use class="wa-dark" on <html>). */

        body.login-body {
            margin: 0;
            font-family: var(--wa-font-family-body);
            background: linear-gradient(
                180deg,
                var(--wa-color-surface-default),
                var(--wa-color-surface-lowered)
            );
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--wa-color-text-normal);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: var(--wa-space-m);
        }

        .login-card {
            background: var(--wa-color-surface-raised);
            border-radius: var(--wa-border-radius-l);
            padding: var(--wa-space-l) var(--wa-space-l) calc(var(--wa-space-l) + var(--wa-space-2xs));
            box-shadow: var(--wa-shadow-l);
            border: var(--wa-border-width-s) var(--wa-border-style) var(--wa-color-surface-border);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--wa-space-l);
        }

        .login-header .fa-vault {
            font-size: var(--wa-font-size-2xl);
            color: var(--wa-color-text-link);
            margin-bottom: var(--wa-space-xs);
        }

        .login-header h2 {
            margin: 0;
            font-size: var(--wa-font-size-l);
            color: var(--wa-color-text-normal);
        }

        .subtitle {
            margin: var(--wa-space-2xs) 0 0;
            font-size: var(--wa-font-size-xs);
            color: var(--wa-color-text-quiet);
        }

        .alert {
            display: flex;
            align-items: center;
            gap: var(--wa-space-xs);
            padding: var(--wa-space-xs) var(--wa-space-s);
            border-radius: var(--wa-border-radius-m);
            font-size: var(--wa-font-size-xs);
            margin-bottom: var(--wa-space-m);
        }

        .alert-error {
            background: var(--wa-color-danger-fill-quiet);
            border: var(--wa-border-width-s) var(--wa-border-style) var(--wa-color-danger-border-normal);
            color: var(--wa-color-danger-on-normal);
        }

        .alert-success {
            background: var(--wa-color-success-fill-quiet);
            border: var(--wa-border-width-s) var(--wa-border-style) var(--wa-color-success-border-normal);
            color: var(--wa-color-success-on-normal);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--wa-space-m);
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: var(--wa-space-2xs);
            font-size: var(--wa-font-size-xs);
            margin-bottom: var(--wa-space-2xs);
            color: var(--wa-color-text-normal);
        }

        .form-group input {
            width: 100%;
            padding: var(--wa-space-s) var(--wa-space-m);
            border-radius: var(--wa-border-radius-m);
            border: var(--wa-form-control-border-width) var(--wa-form-control-border-style) var(--wa-form-control-border-color);
            background: var(--wa-form-control-background-color);
            color: var(--wa-form-control-value-color);
            font-size: var(--wa-font-size-s);
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--wa-color-focus);
            box-shadow: 0 0 0 var(--wa-focus-ring-width) var(--wa-color-focus);
        }

        .btn-primary {
            margin-top: var(--wa-space-2xs);
            width: 100%;
            padding: var(--wa-space-s) var(--wa-space-m);
            border-radius: var(--wa-border-radius-pill);
            border: none;
            background: var(--wa-color-brand-fill-loud);
            color: var(--wa-color-brand-on-loud);
            font-weight: var(--wa-font-weight-semibold);
            font-size: var(--wa-font-size-s);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--wa-space-xs);
        }

        .btn-primary:hover {
            filter: brightness(1.05);
        }

        body.dashboard-body {
            margin: 0;
            font-family: var(--wa-font-family-body);
            background: var(--wa-color-surface-lowered);
            color: var(--wa-color-text-normal);
        }

        .dashboard-container {
            max-width: 960px;
            margin: var(--wa-space-2xl) auto;
            padding: 0 var(--wa-space-m) var(--wa-space-2xl);
        }

        .dashboard-header h1 {
            margin: 0 0 var(--wa-space-2xs);
            font-size: var(--wa-font-size-3xl);
        }

        .dashboard-header p {
            margin: 0 0 var(--wa-space-l);
            color: var(--wa-color-text-quiet);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--wa-space-m);
        }

        .card {
            background: var(--wa-color-surface-raised);
            border-radius: var(--wa-border-radius-l);
            padding: var(--wa-space-m) calc(var(--wa-space-m) + var(--wa-space-2xs)) var(--wa-space-l);
            border: var(--wa-border-width-s) var(--wa-border-style) var(--wa-color-surface-border);
        }

        .card h2 {
            margin: 0 0 var(--wa-space-xs);
            font-size: var(--wa-font-size-l);
        }

        .card p {
            margin: 0 0 var(--wa-space-s);
            font-size: var(--wa-font-size-s);
            color: var(--wa-color-text-quiet);
        }

        .card-link {
            display: inline-block;
            padding: var(--wa-space-2xs) var(--wa-space-s);
            border-radius: var(--wa-border-radius-pill);
            background: var(--wa-color-brand-fill-loud);
            color: var(--wa-color-brand-on-loud);
            font-size: var(--wa-font-size-xs);
            text-decoration: none;
            font-weight: var(--wa-font-weight-semibold);
        }

        .card-link:hover {
            filter: brightness(1.05);
        }

        .dashboard-footer {
            margin-top: var(--wa-space-l);
            font-size: var(--wa-font-size-s);
        }

        .btn-logout {
            display: inline-block;
            padding: var(--wa-space-2xs) var(--wa-space-s);
            border-radius: var(--wa-border-radius-pill);
            border: var(--wa-border-width-s) var(--wa-border-style) var(--wa-color-danger-border-loud);
            background: var(--wa-color-danger-fill-quiet);
            color: var(--wa-color-danger-on-normal);
            font-size: var(--wa-font-size-xs);
            text-decoration: none;
            font-weight: var(--wa-font-weight-semibold);
        }

        .btn-logout:hover {
            background: var(--wa-color-danger-fill-normal);
        }
    </style>
</head>
