<head th:fragment="commonHead(title)" xmlns:th="http://www.thymeleaf.org">
    <!-- Pages must use th:replace="fragments/head :: commonHead(#{...})" — fragment name is commonHead(title). -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title : 'Password Vault'}">Password Vault</title>
    <script>
        (function () {
            var theme = localStorage.getItem('theme') || 'dark';
            var root = document.documentElement;
            root.classList.remove('wa-dark', 'wa-light', 'wa-palette-bright', 'wa-palette-default');
            root.classList.add('wa-theme-awesome', 'wa-brand-blue');
            if (theme === 'light') {
                root.classList.add('wa-light', 'wa-palette-bright');
            } else {
                root.classList.add('wa-dark');
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@v4.0.0-alpha7/dist/htmx.min.js" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof htmx !== 'undefined') htmx.config.implicitInheritance = true;
        });
    </script>

    <script>
        function applyTheme(theme, targetDocument) {
            var doc = targetDocument || document;
            var root = doc.documentElement;

            root.classList.remove(
                'wa-dark',
                'wa-light',
                'wa-palette-bright',
                'wa-palette-default'
            );

            root.classList.add(
                'wa-theme-awesome',
                'wa-brand-blue'
            );

            if (theme === 'light') {
                root.classList.add(
                    'wa-light',
                    'wa-palette-bright'
                );
            } else {
                root.classList.add('wa-dark');
            }

            updateThemeButton(theme);
        }

        function applyThemeToFrame(theme) {
            var frame =
                document.querySelector(
                    'iframe[name="contentFrame"]'
                );

            if (!frame) return;

            try {
                if (frame.contentDocument) {
                    applyTheme(
                        theme,
                        frame.contentDocument
                    );
                }
            } catch (e) {}
        }

        function toggleTheme() {

            var currentTheme =
                localStorage.getItem('theme')
                || 'dark';

            var newTheme =
                currentTheme === 'dark'
                    ? 'light'
                    : 'dark';

            localStorage.setItem(
                'theme',
                newTheme
            );

            applyTheme(
                newTheme,
                document
            );

            applyThemeToFrame(
                newTheme
            );
        }

        function applyThemeButtonClasses(button, theme) {
            if (!button) return;

            button.classList.remove(
                'dark-theme-btn',
                'light-theme-btn'
            );

            if (theme === 'dark') {
                button.classList.add('dark-theme-btn');
            } else {
                button.classList.add('light-theme-btn');
            }
        }

        function updateThemeButton(theme) {

            var button =
                document.getElementById(
                    'themeToggle'
                );

            if (button) {
                if (theme === 'dark') {
                    button.innerHTML = '🌙';
                } else {
                    button.innerHTML = '☀️';
                }
                applyThemeButtonClasses(button, theme);
            }

            applyThemeButtonClasses(
                document.querySelector('.profile-icon-btn'),
                theme
            );
        }

        document.addEventListener(
            'DOMContentLoaded',
            function () {

                var theme =
                    localStorage.getItem('theme')
                    || 'dark';

                applyTheme(
                    theme,
                    document
                );

                applyThemeToFrame(
                    theme
                );
            }
        );


    </script>
