<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="commonHead(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">App</title>

    <!-- Web Awesome / Font Awesome icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">

    <!-- Inline styles for login page and basic layout -->
    <style>
        body.login-body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #111827, #020617);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--wa-color-red-95);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            padding: 24px 24px 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .login-header .fa-vault {
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .login-header h2 {
            margin: 0;
            font-size: 20px;
        }

        .subtitle {
            margin: 4px 0 0;
            font-size: 13px;
            color: #9ca3af;
        }

        .alert {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.6);
            color: #fecaca;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(74, 222, 128, 0.6);
            color: #bbf7d0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            margin-bottom: 4px;
            color: #e5e7eb;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: rgba(15, 23, 42, 0.8);
            color: #e5e7eb;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
        }

        .btn-primary {
            margin-top: 4px;
            width: 100%;
            padding: 10px 12px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(to right, #38bdf8, #6366f1);
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            filter: brightness(1.05);
        }

        body.dashboard-body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #020617;
            color: #e5e7eb;
        }

        .dashboard-container {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 16px 32px;
        }

        .dashboard-header h1 {
            margin: 0 0 4px;
            font-size: 28px;
        }

        .dashboard-header p {
            margin: 0 0 24px;
            color: #9ca3af;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            background: #0f172a;
            border-radius: 12px;
            padding: 16px 18px 18px;
            border: 1px solid rgba(148, 163, 184, 0.35);
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .card p {
            margin: 0 0 12px;
            font-size: 14px;
            color: #9ca3af;
        }

        .card-link {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: #38bdf8;
            color: #020617;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
        }

        .card-link:hover {
            filter: brightness(1.05);
        }

        .dashboard-footer {
            margin-top: 24px;
            font-size: 14px;
        }

        .btn-logout {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(248, 113, 113, 0.7);
            background: rgba(239, 68, 68, 0.15);
            color: #fecaca;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.25);
        }
    </style>
</head>
</html>
