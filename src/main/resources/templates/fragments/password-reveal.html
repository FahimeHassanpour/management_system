<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Toast for password copy / reveal (fixed position; styles in head) -->
<div th:fragment="copyToast" id="copyToast" class="copy-toast"></div>

<script th:fragment="passwordRevealScript" type="text/javascript">
    var passwordHideTimers = {};

    function showCopyToast(message) {
        var toast = document.getElementById('copyToast');
        if (!toast) return;
        toast.textContent = message || 'Copied to clipboard';
        toast.classList.add('show');
        if (showCopyToast._hideTimer) clearTimeout(showCopyToast._hideTimer);
        showCopyToast._hideTimer = setTimeout(function () {
            toast.classList.remove('show');
        }, 2200);
    }

    function copyTextWithFallback(text, onSuccess, onFail) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(onSuccess).catch(function () {
                if (tryExecCommandCopy(text)) onSuccess(); else onFail();
            });
            return;
        }
        if (tryExecCommandCopy(text)) onSuccess(); else onFail();
    }

    function tryExecCommandCopy(text) {
        try {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            var ok = document.execCommand('copy');
            document.body.removeChild(textarea);
            return ok;
        } catch (e) {
            return false;
        }
    }

    function copyUsernameFromCell(button) {
        if (!button) return;
        var text = (button.getAttribute('data-username') || button.textContent || '').trim();
        if (!text) return;
        copyTextWithFallback(text, function () {
            showCopyToast('Username copied');
        }, function () {
            showCopyToast('Could not copy username');
        });
    }

    function revealAndCopyPassword(button, id) {
        var secretEl = document.getElementById('password-' + id);
        if (!secretEl || !button) return;
        var pwd = (secretEl.textContent || '').trim();
        if (!pwd) return;

        var mask = button.querySelector('.password-mask');
        var plain = button.querySelector('.password-plain');

        function applyReveal() {
            if (mask) mask.setAttribute('hidden', 'hidden');
            if (plain) {
                plain.textContent = pwd;
                plain.removeAttribute('hidden');
            }
            if (passwordHideTimers[id]) clearTimeout(passwordHideTimers[id]);
            passwordHideTimers[id] = setTimeout(function () {
                if (plain) {
                    plain.textContent = '';
                    plain.setAttribute('hidden', 'hidden');
                }
                if (mask) mask.removeAttribute('hidden');
                delete passwordHideTimers[id];
            }, 12000);
        }

        function onFail() {
            applyReveal();
            showCopyToast('Password shown — select text to copy if clipboard was blocked');
        }

        copyTextWithFallback(pwd, function () {
            applyReveal();
            showCopyToast('Password copied');
        }, onFail);
    }
</script>
</body>
</html>
