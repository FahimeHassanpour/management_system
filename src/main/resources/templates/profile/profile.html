<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      class="wa-theme-awesome wa-palette-bright wa-brand-blue dashboard-fit">

<head th:replace="fragments/head :: commonHead('My Profile')"></head>

<body class="dashboard-body dashboard-body-fit">

<div class="dashboard-container">

    <div th:if="${successMessage}" class="alert alert-success" style="margin-bottom: var(--wa-space-m);">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" style="margin-bottom: var(--wa-space-m);">
        <span th:text="${errorMessage}"></span>
    </div>

    <section class="card form-card">

        <header class="page-header">
            <h1>My Profile</h1>
        </header>

        <form th:action="@{/profile}"
              method="post"
              enctype="multipart/form-data"
              class="entry-form">

            <div class="profile-photo-row">
                <img th:if="${user.profileImage != null}"
                     th:src="@{'/uploads/profile-images/' + ${user.profileImage}}"
                     alt="Profile"
                     class="profile-photo"/>
                <div th:unless="${user.profileImage != null}"
                     class="profile-photo profile-photo-initials"
                     th:text="${initials}">MM</div>
                <label class="profile-change-photo">
                    <input type="file"
                           name="profileImage"
                           accept="image/*"
                           class="profile-file-input"/>
                    Change photo
                </label>
            </div>

            <div class="form-grid">
                <div class="field">
                    <label for="fullName">Full name</label>
                    <input id="fullName" type="text" name="fullName" th:value="${user.fullName}" required/>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" th:value="${user.email}" readonly disabled/>
                </div>

                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" th:value="${user.username}" required/>
                </div>
            </div>

            <section class="user-edit-teams-field" style="margin-top: var(--wa-space-l);">
                <h2 style="margin: 0 0 var(--wa-space-s);">Change password</h2>
                <p style="margin: 0 0 var(--wa-space-m); color: var(--wa-color-text-quiet); font-size: var(--wa-font-size-s);">
                    Leave password fields blank to keep your current password.
                </p>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password"
                               name="currentPassword">
                    </div>

                    <div class="field">
                        <label for="newPassword">New password</label>
                        <input id="newPassword"
                               type="password"
                               name="newPassword"
                               autocomplete="new-password">
<!--                               placeholder="Leave blank to keep current password"/>-->
                    </div>

                    <div class="field">
                        <label for="confirmPassword">Confirm new password</label>
                        <input id="confirmPassword"
                               type="password"
                               name="confirmPassword"
                               autocomplete="new-password"
                               placeholder="Repeat new password"/>
                    </div>
                </div>
            </section>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Save</button>
            </div>
        </form>

    </section>

</div>

</body>
</html>
