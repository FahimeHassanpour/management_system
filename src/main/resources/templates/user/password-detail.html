<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: commonHead('Password Detail')"></head>
<body>
<h2>Password Detail</h2>

<p><strong>Title:</strong> <span th:text="${entry.title}">Title</span></p>
<p><strong>Username:</strong> <span th:text="${entry.username}">Username</span></p>
<p><strong>Password:</strong> <span th:text="${entry.password}">Password</span></p>
<p><strong>Description:</strong> <span th:text="${entry.description}">Description</span></p>
<p><strong>Category:</strong> <span th:text="${entry.category != null ? entry.category.name : '-'}">-</span></p>

<p><a href="/my/passwords">Back to my passwords</a></p>
</body>
</html>
