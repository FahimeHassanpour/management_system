<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: commonHead('My Passwords')"></head>
<body>
<h2>My Assigned Passwords</h2>

<form action="/my/passwords" method="get">
    <input type="text" name="query" placeholder="Search by title or description" th:value="${query}"/>
    <button type="submit">Search</button>
</form>

<table border="1" cellpadding="8">
    <thead>
    <tr>
        <th>Title</th>
        <th>Username</th>
        <th>Category</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry : ${entries}">
        <td th:text="${entry.title}">Title</td>
        <td th:text="${entry.username}">Username</td>
        <td th:text="${entry.category != null ? entry.category.name : '-'}">Category</td>
        <td><a th:href="@{'/my/passwords/' + ${entry.id}}">View</a></td>
    </tr>
    </tbody>
</table>

<p><a href="/dashboard">Back to dashboard</a></p>
</body>
</html>
