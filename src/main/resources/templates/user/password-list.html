<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead('My Passwords')"></head>

<body class="dashboard-body">
<div class="dashboard-container">
    <div th:replace="~{fragments/password-reveal :: copyToast}"></div>

    <header class="page-header">
        <h1>My Assigned Passwords</h1>
        <p>View credentials assigned to your account.</p>
    </header>

    <section class="card">
        <form action="/my/passwords" method="get" class="toolbar">
            <input type="hidden"
                   name="categoryId"
                   th:value="${categoryId != null ? categoryId : 0}" />
            <input class="toolbar-input"
                   type="text"
                   name="query"
                   placeholder="Search by title or description"
                   th:value="${query}" />
            <button type="submit" class="btn-primary">Search</button>
            <a href="/my/passwords" class="btn-secondary">Reset</a>
        </form>
    </section>

    <section class="card" style="margin-top: var(--wa-space-s);">
        <div style="display:flex; justify-content:flex-start; align-items:center; margin-bottom: var(--wa-space-2xs);">
            <form action="/my/passwords" method="get" class="toolbar">
                <input type="hidden" name="query" th:value="${query}" />

                <span style="width: 100%; text-align: left; font-size: var(--wa-font-size-2xs); color: var(--wa-color-text-quiet);">
                    Filter by category
                </span>
                <select class="toolbar-input toolbar-select-category"
                        name="categoryId"
                        style="appearance: none; -webkit-appearance: none; -moz-appearance: none;"
                        onchange="this.form.requestSubmit()">
                    <option value="0" th:selected="${categoryId == null}">Filter by category</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${categoryId != null and categoryId == category.id}">
                    </option>
                </select>
            </form>
        </div>

        <div class="table-wrap" th:if="${entries != null and !#lists.isEmpty(entries)}">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${entries}"
                    th:classappend="${ entry.id != null and expiryDueIdStrings != null and expiryDueIdStrings.contains(#strings.toString(entry.id)) } ? 'expired-row' : ''">
                    <td th:text="${entry.title}">Title</td>
                    <td>
                        <button type="button" class="username-copy-btn"
                                th:attr="data-username=${entry.username}"
                                title="Click to copy username"
                                onclick="copyUsernameFromCell(this)"
                                th:text="${entry.username}">Username</button>
                    </td>
                    <td class="password-cell">
                        <button type="button" class="password-reveal-btn"
                                title="Click to show password and copy to clipboard"
                                th:onclick="|revealAndCopyPassword(this, ${entry.id})|">
                            <span class="password-mask">••••••••</span>
                            <span class="password-plain" hidden></span>
                        </button>
                        <span th:id="${'password-' + entry.id}" th:text="${entry.password}" hidden></span>
                    </td>
                    <td th:text="${entry.category != null ? entry.category.name : '-'}">Category</td>
                    <td>
                        <a th:href="@{'/my/passwords/' + ${entry.id}}" class="btn-secondary">View</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${entries == null or #lists.isEmpty(entries)}"
             style="text-align:center; padding: var(--wa-space-xl) var(--wa-space-m); color: var(--wa-color-text-quiet);">
            <p>No assigned passwords found.</p>
        </div>
    </section>

</div>
<script th:replace="~{fragments/password-reveal :: passwordRevealScript}"></script>
</body>
</html>
