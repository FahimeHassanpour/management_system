<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      class="wa-dark">

<head th:replace="fragments/head :: commonHead('Admin User Management')"></head>


<body class="dashboard-body">
<div class="dashboard-container">

    <!-- HEADER -->
    <header class="page-header">
        <h1>Admin User Management</h1>
        <p>Manage users, roles, and account information.</p>
    </header>


    <!-- ADMIN ACTIONS -->
    <section class="card" sec:authorize="hasRole('ADMIN')">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
            <p style="margin:0; color: var(--wa-color-text-quiet);">
                Access administration
            </p>

            <a th:href="@{/admin/invitations}" class="card-link">
                Invite user
            </a>
        </div>
    </section>

    <!-- USERS TABLE -->
    <section class="card" style="margin-top: var(--wa-space-m);">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--wa-space-s);">
            <h2 style="margin:0;">Users</h2>

            <p style="margin:0; color: var(--wa-color-text-quiet);"
               th:text="${users != null ? #lists.size(users) + ' user(s)' : '0 user(s)'}">
                0 user(s)
            </p>
        </div>

        <div class="table-wrap">
            <table class="data-table">

                <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="user : ${users}">

                    <!-- FULL NAME -->
                    <td th:text="${user.fullName}">Full Name</td>

                    <!-- EMAIL -->
                    <td th:text="${user.email}">Email</td>

                    <!-- ROLE -->
                    <td>
                        <span th:text="${user.role != null ? user.role.name : 'USER'}"
                              style="display:inline-block; padding:2px 10px; border-radius:999px;
                                     background:var(--wa-color-surface-lowered);
                                     border:var(--wa-border-width-s) var(--wa-border-style) var(--wa-color-surface-border);
                                     font-size:var(--wa-font-size-xs);
                                     font-weight:var(--wa-font-weight-semibold);">
                            USER
                        </span>
                    </td>

                    <!-- EDIT BUTTON -->
                    <td>
                        <a th:href="@{'/admin/users/' + ${user.id} + '/edit'}"
                           class="btn-secondary">
                            Edit
                        </a>
                    </td>

                </tr>

                </tbody>

            </table>
        </div>

    </section>



</div>
</body>
</html>
