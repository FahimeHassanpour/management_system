<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org"
            class="wa-theme-awesome wa-palette-bright wa-brand-blue"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<head th:replace="fragments/head :: commonHead('Admin User Management')"></head>


<body class="dashboard-body">
<div class="dashboard-container">

    <header class="page-header">
        <h1>Admin User Management</h1>
        <p>Manage users, roles, and account information.</p>
    </header>


    <div id="successMessage"
         class="alert alert-success"
         th:style="${successMessage} ? '' : 'display:none'"
         th:text="${successMessage}"></div>
    <div id="errorMessage"
         class="alert alert-danger"
         th:style="${errorMessage} ? '' : 'display:none'"
         th:text="${errorMessage}"></div>

    <section class="card" sec:authorize="hasRole('ADMIN')">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap: var(--wa-space-s);">
            <p style="margin:0; color: var(--wa-color-text-quiet);">
                Access administration
            </p>

            <div style="display:flex; align-items:center; gap: var(--wa-space-xs); flex-wrap: wrap;">
                <a th:href="@{/admin/invitations}" class="card-link">
                    Invite user
                </a>
            </div>
        </div>
    </section>

    <section class="card users-table-card" style="margin-top: var(--wa-space-m);">

        <div class="users-table-heading">
            <h2>Users</h2>

            <p class="users-table-count"
               th:text="${totalElements != null ? totalElements + ' user(s)' : (users != null ? #lists.size(users) + ' user(s)' : '0 user(s)')}">
                0 user(s)
            </p>
        </div>

        <div class="table-wrap table-wrap-scroll">
            <table class="data-table users-table">

                <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Teams</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="user : ${users}"
                    th:classappend="${!user.active} ? ' user-row-inactive' : ''">

                    <td class="users-cell-name" th:text="${user.fullName}">Full Name</td>

                    <td class="users-cell-email" th:text="${user.email}">Email</td>

                    <td>
                        <span class="role-badge"
                              th:text="${user.role != null ? user.role.name : 'USER'}"
                              th:classappend="${user.role != null and user.role.name == 'ADMIN'} ? ' role-admin'
                                : (${user.role != null and user.role.name == 'MANAGER'} ? ' role-manager' : ' role-user')">
                            USER
                        </span>
                    </td>

                    <td>
                        <span th:if="${user.active}"
                              class="status-badge status-active">Active</span>
                        <span th:unless="${user.active}"
                              class="status-badge status-inactive">Inactive</span>
                    </td>

                    <td class="users-cell-teams">
                        <span th:if="${user.userTeams == null or #lists.isEmpty(user.userTeams)}"
                              class="teams-empty">—</span>
                        <span th:each="ut : ${user.userTeams}"
                              th:if="${ut.team != null}"
                              th:text="${ut.team.name}"
                              class="team-pill">
                        </span>
                    </td>

                    <td class="users-cell-action">
                        <div class="row-actions">
                            <a th:href="@{'/admin/users/' + ${user.id} + '/edit'}"
                               class="table-action-btn"
                               aria-label="Edit user">
                                <i class="fa-solid fa-pen" aria-hidden="true"></i>
                                <span class="table-action-tooltip">Edit</span>
                                <span class="sr-only">Edit</span>
                            </a>

                            <form sec:authorize="hasRole('ADMIN')"
                                  th:if="${user.active}"
                                  th:action="@{'/admin/users/' + ${user.id} + '/active'}"
                                  method="post"
                                  onsubmit="return confirm('Deactivate this user? They will not be able to login.');">
                                <input type="hidden" name="active" value="false" />
                                <button type="submit"
                                        class="table-action-btn table-action-btn-danger"
                                        aria-label="Deactivate user">
                                    <i class="fa-solid fa-user-slash" aria-hidden="true"></i>
                                    <span class="table-action-tooltip">Deactivate</span>
                                    <span class="sr-only">Deactivate</span>
                                </button>
                            </form>

                            <form sec:authorize="hasRole('ADMIN')"
                                  th:unless="${user.active}"
                                  th:action="@{'/admin/users/' + ${user.id} + '/active'}"
                                  method="post"
                                  onsubmit="return confirm('Activate this user? They will be able to login again.');">
                                <input type="hidden" name="active" value="true" />
                                <button type="submit"
                                        class="table-action-btn table-action-btn-success"
                                        aria-label="Activate user">
                                    <i class="fa-solid fa-user-check" aria-hidden="true"></i>
                                    <span class="table-action-tooltip">Activate</span>
                                    <span class="sr-only">Activate</span>
                                </button>
                            </form>
                        </div>
                    </td>

                </tr>

                </tbody>

            </table>
        </div>

        <div th:replace="~{fragments/pagination :: bar(
            prevUrl = ${currentPage != null and currentPage > 0}
                ? @{/admin/users(page=${currentPage - 1}, size=${size})}
                : null,
            nextUrl = ${currentPage != null and totalPages != null and currentPage < totalPages - 1}
                ? @{/admin/users(page=${currentPage + 1}, size=${size})}
                : null,
            currentPage = ${currentPage},
            totalPages = ${totalPages},
            totalElements = ${totalElements},
            itemLabel = 'users'
        )}"></div>

    </section>



</div>
</body>
</html>
