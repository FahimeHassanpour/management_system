<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      class="wa-theme-awesome wa-palette-bright wa-brand-blue">
<head th:replace="fragments/head :: commonHead('Password categories')">


    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

</head>

<body class="dashboard-body">
<div class="dashboard-container">


    <header class="page-header">
        <h1>Password categories</h1>
        <p>Create password categories used when saving password entries</p>
    </header>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <section class="card" style="margin-top: var(--wa-space-m);">
        

        <form th:action="@{/admin/categories}" method="post" class="entry-form">
            <h2 style="margin-top: 0; font-size: var(--wa-font-size-l);">
                Add Category
            </h2>

            <div style="display:flex; align-items:flex-end; gap: var(--wa-space-s); flex-wrap:wrap;">
                <div class="field" style="flex:1 1 260px; margin:0;">
                    <label for="name">Name</label>
                    <input id="name" type="text" name="name" required minlength="1" />
                </div>

                <button type="submit" class="btn-primary">Add</button>
            </div>
        </form>
    </section>


    <section class="card" style="margin-top: var(--wa-space-m);">

        <h2 style="margin-top: 0; font-size: var(--wa-font-size-l);">
            Existing categories
        </h2>

        <div class="table-wrap table-wrap-scroll"
             th:if="${categories != null and !#lists.isEmpty(categories)}">

            <table class="data-table">

                <thead>

                <tr>
                    <th>Name</th>
                    <th class="actions-cell">Actions</th>
                </tr>
                </thead>

                <tbody>


                <tr th:each="cat : ${categories}" th:id="'row-' + ${cat.id}">
                    <td>
                        <form th:id="'update-form-' + ${cat.id}"
                              th:action="@{/admin/categories/update}"
                              method="post">
                            <input type="hidden" name="id" th:value="${cat.id}" />
                            <input th:id="'cat-name-' + ${cat.id}"
                                   type="text"
                                   class="category-name-input"
                                   name="name"
                                   th:value="${cat.name}"
                                   required
                                   minlength="1"
                                   readonly />
                        </form>
                    </td>

                    <td class="actions-cell">
                        <div class="row-actions category-view-actions"
                             th:id="'cat-view-actions-' + ${cat.id}"
                             style="flex-wrap: nowrap;">
                            <button type="button"
                                    class="table-action-btn"
                                    th:attr="data-id=${cat.id}"
                                    onclick="startCategoryEdit(this)"
                                    aria-label="Update">
                                <i class="fa-solid fa-pen" aria-hidden="true"></i>
                                <span class="table-action-tooltip">Update</span>
                                <span class="sr-only">Update</span>
                            </button>
                            <button type="button"
                                    class="table-action-btn table-action-btn-danger"
                                    th:onclick="'deleteCategory(' + ${cat.id} + ')'"
                                    aria-label="Delete">
                                <i class="fa-solid fa-trash" aria-hidden="true"></i>
                                <span class="table-action-tooltip">Delete</span>
                                <span class="sr-only">Delete</span>
                            </button>
                        </div>
                        <div class="row-actions category-edit-actions"
                             th:id="'cat-edit-actions-' + ${cat.id}"
                             style="flex-wrap: nowrap; display: none;">
                            <button type="button"
                                    class="table-action-btn"
                                    th:attr="data-id=${cat.id}"
                                    onclick="saveCategoryEdit(this)"
                                    aria-label="Save">
                                <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
                                <span class="table-action-tooltip">Save</span>
                                <span class="sr-only">Save</span>
                            </button>
                            <button type="button"
                                    class="table-action-btn"
                                    th:attr="data-id=${cat.id}"
                                    onclick="cancelCategoryEdit(this)"
                                    aria-label="Cancel">
                                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                                <span class="table-action-tooltip">Cancel</span>
                                <span class="sr-only">Cancel</span>
                            </button>
                        </div>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>

        <p th:if="${categories == null or #lists.isEmpty(categories)}"
           style="color: var(--wa-color-text-quiet); margin: 0;">
            No categories yet. Add one above.
        </p>

        <div th:replace="~{fragments/pagination :: bar(
            prevUrl = ${currentPage != null and currentPage > 0}
                ? @{/admin/categories(page=${currentPage - 1}, size=${size})}
                : null,
            nextUrl = ${currentPage != null and totalPages != null and currentPage < totalPages - 1}
                ? @{/admin/categories(page=${currentPage + 1}, size=${size})}
                : null,
            currentPage = ${currentPage},
            totalPages = ${totalPages},
            totalElements = ${totalElements},
            itemLabel = 'categories'
        )}"></div>

    </section>



</div>

<script>
    function getCategoryRowParts(id) {
        return {
            input: document.getElementById('cat-name-' + id),
            form: document.getElementById('update-form-' + id),
            viewActions: document.getElementById('cat-view-actions-' + id),
            editActions: document.getElementById('cat-edit-actions-' + id)
        };
    }

    function startCategoryEdit(button) {
        const id = button.getAttribute('data-id');
        const parts = getCategoryRowParts(id);
        if (!parts.input || !parts.viewActions || !parts.editActions || !parts.form) return;

        parts.form.dataset.originalName = parts.input.value;

        parts.input.readOnly = false;
        parts.input.classList.add('is-editing');
        parts.input.focus();
        parts.input.select();

        parts.viewActions.style.display = 'none';
        parts.editActions.style.display = 'inline-flex';
    }

    function cancelCategoryEdit(button) {
        const id = button.getAttribute('data-id');
        const parts = getCategoryRowParts(id);
        if (!parts.input || !parts.viewActions || !parts.editActions || !parts.form) return;

        parts.input.value = parts.form.dataset.originalName || parts.input.value;
        parts.input.readOnly = true;
        parts.input.classList.remove('is-editing');

        parts.viewActions.style.display = 'inline-flex';
        parts.editActions.style.display = 'none';
    }

    function saveCategoryEdit(button) {
        const id = button.getAttribute('data-id');
        const parts = getCategoryRowParts(id);
        if (!parts.input || !parts.form) return;

        if (!parts.input.value.trim()) {
            alert('Category name cannot be empty.');
            parts.input.focus();
            return;
        }

        parts.form.submit();
    }

    function deleteCategory(id) {
        if (!confirm("Are you sure?")) return;

        const tokenMeta = document.querySelector('meta[name="_csrf"]');
        const headerMeta = document.querySelector('meta[name="_csrf_header"]');

        const headers = {
            'Content-Type': 'application/x-www-form-urlencoded'
        };

        if (tokenMeta && headerMeta) {
            headers[headerMeta.content] = tokenMeta.content;
        }

        fetch('/admin/categories/delete', {
            method: 'POST',
            headers: headers,
            body: 'id=' + id
        })
            .then(async (response) => {
                const data = await response.json().catch(() => ({}));
                if (response.ok) {
                    const row = document.getElementById('row-' + id);
                    if (row) row.remove();
                } else {
                    alert(data.message || "Cannot delete this category.");
                }
            })
            .catch((error) => {
                console.error(error);
                alert("Error occurred");
            });
    }


</script>

</body>
</html>
