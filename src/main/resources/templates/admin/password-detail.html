<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead('Password Detail')"></head>

<body class="dashboard-body">
<div class="dashboard-container">

    <header class="page-header">
        <h1>Password Detail</h1>
        <p>View the full credentials assigned to you.</p>
    </header>

    <section class="card form-card">
        <div class="entry-form">

            <div class="form-grid">
                <div class="field">
                    <label>Title</label>
                    <input type="text" th:value="${entry.title}" readonly />
                </div>

                <div class="field">
                    <label>Account Username</label>
                    <input type="text" th:value="${entry.username}" readonly />
                </div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="password-row">
                    <input id="passwordValue" type="password" th:value="${entry.password}" readonly />
                    <button type="button" class="btn-secondary" onclick="togglePassword()">Show</button>
                </div>
            </div>

            <div class="field">
                <label>Description</label>
                <textarea rows="4" readonly
                          th:text="${entry.description != null and !#strings.isEmpty(entry.description)} ? ${entry.description} : '-'">-</textarea>
            </div>

            <div class="field">
                <label>Category</label>
                <input type="text" th:value="${entry.category != null ? entry.category.name : '-'}" readonly />
            </div>
        </div>
    </section>


</div>

<script>
    function togglePassword() {
        const input = document.getElementById('passwordValue');
        if (!input) return;
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
</body>
</html>
