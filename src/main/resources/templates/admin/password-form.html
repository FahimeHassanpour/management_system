<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: commonHead('Password Form')"></head>
<body>
<h2 th:text="${isEdit} ? 'Edit Password Entry' : 'Create Password Entry'">Password Entry</h2>

<form th:action="${isEdit} ? @{'/admin/passwords/' + ${entryId}} : @{/admin/passwords}" method="post">
    <label>Title</label><br/>
    <input type="text" name="title" th:value="${entryRequest.title}" required/><br/><br/>

    <label>Account Username</label><br/>
    <input type="text" name="username" th:value="${entryRequest.username}" required/><br/><br/>

    <label>Password</label><br/>
    <input type="text" name="password" th:value="${entryRequest.password}" required/><br/><br/>

    <label>Description</label><br/>
    <textarea name="description" rows="4" cols="50" th:text="${entryRequest.description}"></textarea><br/><br/>

    <label>Category</label><br/>
    <select name="categoryId">
        <option value="">No category</option>
        <option th:each="category : ${categories}"
                th:value="${category.id}"
                th:text="${category.name}"
                th:selected="${entryRequest.categoryId == category.id}">
        </option>
    </select><br/><br/>

    <button type="submit">Save</button>
    <a href="/admin/passwords">Cancel</a>
</form>

</body>
</html>
