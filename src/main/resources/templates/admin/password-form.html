<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead(${isEdit} ? 'Edit Password Entry' : 'Create Password Entry')"></head>

<body class="dashboard-body">
<div class="dashboard-container">

    <header class="page-header">
        <h1 th:text="${isEdit} ? 'Edit Password Entry' : 'Create Password Entry'">Create Password Entry</h1>
        <p th:text="${isEdit} ? 'Update existing vault record details.' : 'Add a new vault record and assign category.'">
            Add a new vault record and assign category.
        </p>
    </header>

    <section class="card form-card">
        <form th:action="${isEdit} ? @{'/admin/passwords/' + ${entryId}} : @{/admin/passwords}"
              method="post"
              class="entry-form">

            <div class="form-grid">
                <div class="field">
                    <label for="title">Title</label>
                    <input id="title"
                           type="text"
                           name="title"
                           th:value="${entryRequest.title}"
                           placeholder="e.g. ERP Admin Account"
                           required />
                </div>

                <div class="field">
                    <label for="username">Account Username</label>
                    <input id="username"
                           type="text"
                           name="username"
                           th:value="${entryRequest.username}"
                           placeholder="e.g. admin@company.com"
                           required />
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="password-row">
                    <input id="password"
                           type="password"
                           name="password"
                           th:value="${entryRequest.password}"
                           placeholder="Enter password"
                           required />
                    <button type="button" class="btn-secondary" onclick="togglePassword()">Show</button>
                </div>
            </div>

            <div class="field">
                <label for="description">Description</label>
                <textarea id="description"
                          name="description"
                          rows="4"
                          placeholder="Optional notes (owner, rotation policy, environment, etc.)"
                          th:text="${entryRequest.description}"></textarea>
            </div>

            <div class="field category-field">
                <label for="categoryId">Category</label>
                <select id="categoryId" name="categoryId">
                    <option value="">No category</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${entryRequest.categoryId == category.id}">
                    </option>
                </select>
            </div>

            <div class="field category-field">
                <label>Users with access</label>
                <button type="button" class="btn-secondary" onclick="openUsersModal()">Select users</button>
                <p id="selectedUsersSummary" style="margin-top:8px; color: var(--wa-color-text-quiet); font-size: var(--wa-font-size-xs);">
                    No users selected.
                </p>
            </div>

            <div id="usersModalBackdrop"
                 style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:999;">
            </div>
            <div id="usersModal"
                 style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:min(720px, 92vw); max-height:80vh; overflow:auto; background:var(--wa-color-surface-raised); border:var(--wa-border-width-s) var(--wa-border-style) var(--wa-color-surface-border); border-radius:var(--wa-border-radius-l); padding:var(--wa-space-m); z-index:1000;">
                <h3 style="margin-top:0;">Select users with access</h3>
                <div style="display:grid; gap:8px; margin-bottom:var(--wa-space-m);">
                    <label th:each="user : ${users}" style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox"
                               name="userIds"
                               th:value="${user.id}"
                               th:checked="${selectedUserIds != null and #sets.contains(selectedUserIds, user.id)}"
                               onchange="updateSelectedUsersSummary()" />
                        <span th:text="${user.username + ' (' + user.email + ')'}">username (email)</span>
                    </label>
                </div>
                <div style="display:flex; gap:8px; justify-content:flex-end;">
                    <button type="button" class="btn-secondary" onclick="closeUsersModal()">Done</button>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <span th:text="${isEdit} ? 'Update Entry' : 'Create Entry'">Create Entry</span>
                </button>
                <a href="/admin/passwords" class="btn-secondary">Cancel</a>
            </div>

        </form>
    </section>

    <footer class="dashboard-footer">
        <a href="/admin/passwords" class="card-link">Back to entries</a>
    </footer>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        if (!passwordInput) return;
        passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
    }

    function openUsersModal() {
        const modal = document.getElementById('usersModal');
        const backdrop = document.getElementById('usersModalBackdrop');
        if (!modal || !backdrop) return;
        modal.style.display = 'block';
        backdrop.style.display = 'block';
    }

    function closeUsersModal() {
        const modal = document.getElementById('usersModal');
        const backdrop = document.getElementById('usersModalBackdrop');
        if (!modal || !backdrop) return;
        modal.style.display = 'none';
        backdrop.style.display = 'none';
        updateSelectedUsersSummary();
    }

    function updateSelectedUsersSummary() {
        const checkboxes = document.querySelectorAll('input[name="userIds"]:checked');
        const summary = document.getElementById('selectedUsersSummary');
        if (!summary) return;
        if (checkboxes.length === 0) {
            summary.textContent = 'No users selected.';
            return;
        }

        const labels = Array.from(checkboxes)
            .map(cb => cb.closest('label'))
            .filter(Boolean)
            .map(label => label.querySelector('span')?.textContent || '')
            .filter(Boolean);

        summary.textContent = labels.length > 0
            ? `Selected: ${labels.join(', ')}`
            : `${checkboxes.length} user(s) selected.`;
    }

    document.addEventListener('DOMContentLoaded', function() {
        updateSelectedUsersSummary();
        const backdrop = document.getElementById('usersModalBackdrop');
        if (backdrop) {
            backdrop.addEventListener('click', closeUsersModal);
        }
    });
</script>
</body>
</html>
