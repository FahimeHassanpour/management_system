<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      class="wa-theme-awesome wa-palette-bright wa-brand-blue">
<head th:replace="fragments/head :: commonHead(${isEdit} ? 'Edit Password Entry' : 'Create Password Entry')"></head>

<body class="dashboard-body">
<div class="dashboard-container">

    <header class="page-header">
        <h1 th:text="${isEdit} ? 'Edit Password Entry' : 'Create Password Entry'">Create Password Entry</h1>
        <p th:text="${isEdit} ? 'Update existing vault record details.' : 'Add a new vault record and assign category.'">
            Add a new vault record and assign category.
        </p>
    </header>

    <footer class="dashboard-footer" style="margin-bottom: var(--wa-space-m);">
        <a href="/admin/passwords" class="card-link">Back to entries</a>
    </footer>

    <section class="card form-card">
        <form th:action="${isEdit} ? @{'/admin/passwords/' + ${entryId}} : @{/admin/passwords}"
              method="post"
              class="entry-form">

            <div class="form-grid">
                <div class="field">
                    <label for="title">Title</label>
                    <input id="title"
                           type="text"
                           name="title"
                           th:value="${entryRequest.title}"
                           placeholder="e.g. ERP Admin Account"
                           required />
                </div>

                <div class="field">
                    <label for="username">Account Username</label>
                    <input id="username"
                           type="text"
                           name="username"
                           th:value="${entryRequest.username}"
                           placeholder="e.g. admin@company.com"
                           required />
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>

                <div class="password-row">

                    <input id="password"
                           type="password"
                           name="password"
                           th:value="${entryRequest.password}"
                           placeholder="Enter password"
                           required />

                    <!-- existing logic - DO NOT CHANGE -->
                    <button type="button"
                            class="btn-secondary"
                            onclick="togglePassword()">

                        Show

                    </button>

                    <!-- NEW -->
                    <button type="button"
                            class="btn-secondary"
                            onclick="generatePassword()">

                        Generate

                    </button>

                </div>

                <!-- NEW -->
                <div id="strength-text"></div>

            </div>


            <div class="field">
                <label for="description">Description</label>
                <textarea id="description"
                          name="description"
                          rows="4"
                          placeholder="Optional notes (owner, rotation policy, environment, etc.)"
                          th:text="${entryRequest.description}"></textarea>
            </div>

            <div class="field category-field">
                <label for="categoryId">Category</label>
                <select id="categoryId" name="categoryId" required>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${entryRequest.categoryId == category.id}">
                    </option>
                </select>
            </div>

            <div class="field">
                <label for="expiryDate">Expiry Date</label>
                <input id="expiryDate"
                       type="date"
                       name="expiryDate"
                       th:value="${entryRequest.expiryDate}" />
            </div>

            <div class="field category-field">

                <label>Teams with access</label>

                <div class="user-select-dropdown">

                    <button type="button"
                            id="teamDropdownToggle"
                            class="btn-secondary user-dropdown-toggle"
                            aria-expanded="false"
                            onclick="toggleTeamDropdown()">

        <span id="teamDropdownLabel"
              class="user-dropdown-label">

            Select teams

        </span>

                        <span class="user-dropdown-chevron">
            ▾
        </span>

                    </button>

                    <div id="teamDropdownPanel"
                         class="user-dropdown-panel">
                        <div class="user-dropdown-list">

                            <label th:each="team : ${teams}"
                                   class="user-access-row">

                                <input type="checkbox"
                                       class="team-access-checkbox"
                                       name="teamIds"
                                       th:value="${team.id}"
                                       th:checked="${selectedTeamIds != null and #sets.contains(selectedTeamIds, team.id)}"
                                       onchange="updateTeamDropdownLabel()" />

                                <span th:text="${team.name}">
                    Team Name
                </span>

                            </label>

                        </div>

                    </div>

                </div>


                <label>Users with access</label>
                <div class="user-select-dropdown">
                    <button type="button"
                            id="userDropdownToggle"
                            class="btn-secondary user-dropdown-toggle"
                            aria-expanded="false"
                            onclick="toggleUserDropdown()">
                        <span id="userDropdownLabel" class="user-dropdown-label">Select users</span>
                        <span class="user-dropdown-chevron">▾</span>
                    </button>
                    <div id="userDropdownPanel" class="user-dropdown-panel">
                        <div class="user-dropdown-list">
                            <label th:each="user : ${users}" class="user-access-row">
                                <input type="checkbox"
                                       class="user-access-checkbox"
                                       name="userIds"
                                       th:value="${user.id}"
                                       th:checked="${selectedUserIds != null and #sets.contains(selectedUserIds, user.id)}"
                                       onchange="updateUserDropdownLabel()" />
                                <span th:text="${user.username + ' (' + user.email + ')'}">username (email)</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <span th:text="${isEdit} ? 'Update Entry' : 'Create Entry'">Create Entry</span>
                </button>
                <a href="/admin/passwords" class="btn-secondary">Cancel</a>
            </div>

        </form>
    </section>


</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        if (!passwordInput) return;
        passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
    }

    function toggleUserDropdown() {
        const panel = document.getElementById('userDropdownPanel');
        const toggle = document.getElementById('userDropdownToggle');
        if (!panel || !toggle) return;
        const isOpen = panel.style.display === 'block';
        panel.style.display = isOpen ? 'none' : 'block';
        toggle.setAttribute('aria-expanded', String(!isOpen));
    }

    function updateUserDropdownLabel() {
        const checkboxes = document.querySelectorAll('input[name="userIds"]:checked');
        const label = document.getElementById('userDropdownLabel');
        if (!label) return;

        if (checkboxes.length === 0) {
            label.textContent = 'Select users';
            return;
        }

        if (checkboxes.length === 1) {
            const singleLabel = checkboxes[0]
                .closest('label')
                ?.querySelector('span')
                ?.textContent;
            label.textContent = singleLabel || '1 user selected';
            return;
        }

        label.textContent = `${checkboxes.length} users selected`;
    }



        function generatePassword(){

        const upper =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ"

        const lower =
        "abcdefghijklmnopqrstuvwxyz"

        const numbers =
        "0123456789"

        const symbols =
        "!@#$%^&*()-_=+"

        let password = ""

        password += upper[
        Math.floor(
        Math.random() *
        upper.length
        )
        ]

        password += lower[
        Math.floor(
        Math.random() *
        lower.length
        )
        ]

        password += numbers[
        Math.floor(
        Math.random() *
        numbers.length
        )
        ]

        password += symbols[
        Math.floor(
        Math.random() *
        symbols.length
        )
        ]


        const all =
        upper +
        lower +
        numbers +
        symbols

        for(let i=0;i<12;i++){

        password += all[
        Math.floor(
        Math.random() *
        all.length
        )
        ]

    }

        password =
        password
        .split('')
        .sort(
        ()=>Math.random()-0.5
        )
        .join('')


        document
        .getElementById(
        "password"
        )
        .value = password

        checkStrength()

    }



        function checkStrength(){

        const value =
        document
        .getElementById(
        "password"
        )
        .value

        let score = 0

        if(value.length >= 12)
        score++

        if(/[A-Z]/.test(value))
        score++

        if(/[a-z]/.test(value))
        score++

        if(/[0-9]/.test(value))
        score++

        if(/[!@#$%^&*]/.test(value))
        score++


        const text =
        document
        .getElementById(
        "strength-text"
        )

        if(score <=2){

        text.innerHTML =
        "🔴 Weak"

    }

        else if(score <=4){

        text.innerHTML =
        "🟡 Medium"

    }

        else{

        text.innerHTML =
        "🟢 Strong"

    }

    }


        document
        .getElementById(
        "password"
        )
        .addEventListener(
        "input",
        checkStrength
        )


    document.addEventListener('DOMContentLoaded', function() {
        updateUserDropdownLabel();
        updateTeamDropdownLabel();

        document.addEventListener('click', function (event) {
            const panel = document.getElementById('userDropdownPanel');
            const toggle = document.getElementById('userDropdownToggle');
            if (!panel || !toggle) return;

            const target = event.target;
            if (!(target instanceof Node)) return;

            const clickedInsideDropdown = panel.contains(target) || toggle.contains(target);
            if (!clickedInsideDropdown) {
                panel.style.display = 'none';
                toggle.setAttribute('aria-expanded', 'false');
            }
        });
    });


    function toggleTeamDropdown() {
        const panel = document.getElementById('teamDropdownPanel');
        const toggle = document.getElementById('teamDropdownToggle');
        if (!panel || !toggle) return;
        const isOpen = panel.style.display === 'block';
        panel.style.display = isOpen ? 'none' : 'block';
        toggle.setAttribute('aria-expanded', String(!isOpen));
    }

    function updateTeamDropdownLabel() {

        const checked =
            document.querySelectorAll(
                '.team-access-checkbox:checked'
            );

        const label =
            document.getElementById(
                'teamDropdownLabel'
            );

        if (checked.length === 0) {

            label.textContent =
                'Select teams';

        } else {

            label.textContent =
                checked.length +
                ' teams selected';
        }
    }

    document.addEventListener(
        'click',
        function (event) {

            const dropdown =
                document.querySelector(
                    '#teamDropdownToggle'
                );

            const panel =
                document.getElementById(
                    'teamDropdownPanel'
                );

            if (
                dropdown &&
                panel &&
                !dropdown.contains(event.target) &&
                !panel.contains(event.target)
            ) {
                panel.style.display = 'none';
                dropdown.setAttribute('aria-expanded', 'false');
            }
        }
    );
</script>
</body>
</html>
