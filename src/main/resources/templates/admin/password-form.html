<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead(${isEdit} ? 'Edit Password Entry' : 'Create Password Entry')"></head>

<body class="dashboard-body">
<div class="dashboard-container">

    <header class="page-header">
        <h1 th:text="${isEdit} ? 'Edit Password Entry' : 'Create Password Entry'">Create Password Entry</h1>
        <p th:text="${isEdit} ? 'Update existing vault record details.' : 'Add a new vault record and assign category.'">
            Add a new vault record and assign category.
        </p>
    </header>

    <footer class="dashboard-footer" style="margin-bottom: var(--wa-space-m);">
        <a href="/admin/passwords" class="card-link">Back to entries</a>
    </footer>

    <section class="card form-card">
        <form th:action="${isEdit} ? @{'/admin/passwords/' + ${entryId}} : @{/admin/passwords}"
              method="post"
              class="entry-form">

            <div class="form-grid">
                <div class="field">
                    <label for="title">Title</label>
                    <input id="title"
                           type="text"
                           name="title"
                           th:value="${entryRequest.title}"
                           placeholder="e.g. ERP Admin Account"
                           required />
                </div>

                <div class="field">
                    <label for="username">Account Username</label>
                    <input id="username"
                           type="text"
                           name="username"
                           th:value="${entryRequest.username}"
                           placeholder="e.g. admin@company.com"
                           required />
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="password-row">
                    <input id="password"
                           type="password"
                           name="password"
                           th:value="${entryRequest.password}"
                           placeholder="Enter password"
                           required />
                    <button type="button" class="btn-secondary" onclick="togglePassword()">Show</button>
                </div>
            </div>

            <div class="field">
                <label for="description">Description</label>
                <textarea id="description"
                          name="description"
                          rows="4"
                          placeholder="Optional notes (owner, rotation policy, environment, etc.)"
                          th:text="${entryRequest.description}"></textarea>
            </div>

            <div class="field category-field">
                <label for="categoryId">Category</label>
                <select id="categoryId" name="categoryId" required>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${entryRequest.categoryId == category.id}">
                    </option>
                </select>
            </div>

            <div class="field">
                <label for="expiryDate">Expiry Date</label>
                <input id="expiryDate"
                       type="date"
                       name="expiryDate"
                       th:value="${entryRequest.expiryDate}" />
            </div>

            <div class="field category-field">
                <label>Users with access</label>
                <div class="user-select-dropdown">
                    <button type="button"
                            id="userDropdownToggle"
                            class="btn-secondary user-dropdown-toggle"
                            aria-expanded="false"
                            onclick="toggleUserDropdown()">
                        <span id="userDropdownLabel" class="user-dropdown-label">Select users</span>
                        <span class="user-dropdown-chevron">▾</span>
                    </button>
                    <div id="userDropdownPanel" class="user-dropdown-panel">
                        <div class="user-dropdown-list">
                            <label th:each="user : ${users}" class="user-access-row">
                                <input type="checkbox"
                                       class="user-access-checkbox"
                                       name="userIds"
                                       th:value="${user.id}"
                                       th:checked="${selectedUserIds != null and #sets.contains(selectedUserIds, user.id)}"
                                       onchange="updateUserDropdownLabel()" />
                                <span th:text="${user.username + ' (' + user.email + ')'}">username (email)</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <span th:text="${isEdit} ? 'Update Entry' : 'Create Entry'">Create Entry</span>
                </button>
                <a href="/admin/passwords" class="btn-secondary">Cancel</a>
            </div>

        </form>
    </section>


</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        if (!passwordInput) return;
        passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
    }

    function toggleUserDropdown() {
        const panel = document.getElementById('userDropdownPanel');
        const toggle = document.getElementById('userDropdownToggle');
        if (!panel || !toggle) return;
        const isOpen = panel.style.display === 'block';
        panel.style.display = isOpen ? 'none' : 'block';
        toggle.setAttribute('aria-expanded', String(!isOpen));
    }

    function updateUserDropdownLabel() {
        const checkboxes = document.querySelectorAll('input[name="userIds"]:checked');
        const label = document.getElementById('userDropdownLabel');
        if (!label) return;

        if (checkboxes.length === 0) {
            label.textContent = 'Select users';
            return;
        }

        if (checkboxes.length === 1) {
            const singleLabel = checkboxes[0]
                .closest('label')
                ?.querySelector('span')
                ?.textContent;
            label.textContent = singleLabel || '1 user selected';
            return;
        }

        label.textContent = `${checkboxes.length} users selected`;
    }

    document.addEventListener('DOMContentLoaded', function() {
        updateUserDropdownLabel();

        document.addEventListener('click', function (event) {
            const panel = document.getElementById('userDropdownPanel');
            const toggle = document.getElementById('userDropdownToggle');
            if (!panel || !toggle) return;

            const target = event.target;
            if (!(target instanceof Node)) return;

            const clickedInsideDropdown = panel.contains(target) || toggle.contains(target);
            if (!clickedInsideDropdown) {
                panel.style.display = 'none';
                toggle.setAttribute('aria-expanded', 'false');
            }
        });
    });
</script>
</body>
</html>
