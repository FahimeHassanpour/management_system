<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      class="wa-theme-awesome wa-palette-bright wa-brand-blue">
<head th:replace="~{fragments/head :: commonHead('Admin Password Entries')}"></head>
<div id="content" th:fragment="content">
    <div th:if="${successMessage}" class="alert alert-success" style="margin-bottom: var(--wa-space-m);">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" style="margin-bottom: var(--wa-space-m);">
        <span th:text="${errorMessage}"></span>
    </div>
    <div th:replace="~{fragments/password-reveal :: copyToast}"></div>
    <div class="dashboard-container admin-passwords-page">
        <header class="page-header"><h1>Manage Password Entries</h1>
            <p>Search, manage, and assign password records.</p></header>
        <section class="card">
            <div class="toolbar">
                <form hx-get="/admin/passwords/fragments" hx-target="#content" hx-push-url="true" class="toolbar">
                    <input type="hidden" name="page" value="0"/>
                    <input type="hidden" name="size" th:value="${size != null ? size : 10}"/>
                    <input type="hidden" name="categoryId" th:value="${categoryId != null ? categoryId : 0}"/>
                    <input class="toolbar-input toolbar-search-input" type="text" name="query"
                           placeholder="Search by title, description or username"
                           th:value="${query}"/>
                    <button type="submit" class="btn-primary">Search</button>
                    <a class="btn-secondary"
                       th:attr="hx-get=@{/admin/passwords/fragments(page=0,size=${size != null ? size : 10},categoryId=0,query='')},hx-target='#content',hx-push-url='true'">
                        Reset
                    </a>
                </form>


            </div>
        </section>
        <section class="card" style="margin-top: var(--wa-space-s);">
            <div class="passwords-table-toolbar">

                <form hx-get="/admin/passwords/fragments"
                      hx-target="#content"
                      hx-push-url="true"
                      class="toolbar passwords-filter-form">
                    <input type="hidden" name="page" value="0"/>
                    <input type="hidden" name="size" th:value="${size != null ? size : 10}"/>
                    <input type="hidden" name="query" th:value="${query}"/>
                    <label class="passwords-filter-label">Filter by category</label>
                    <div class="select-dropdown-wrap">
                        <select class="toolbar-input toolbar-select-category"
                                name="categoryId"
                                onchange="this.form.requestSubmit()">
                            <option value="0" th:selected="${categoryId == null}">All categories</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"
                                    th:selected="${categoryId != null and categoryId == category.id}">
                            </option>
                        </select>
                        <span class="user-dropdown-chevron" aria-hidden="true">▾</span>
                    </div>
                </form>

                <div class="passwords-actions">

                    <a href="/admin/passwords/new" class="btn-primary">
                        Create new
                    </a>

                    <div class="import-popup-wrapper" id="importPopupWrapper">

                        <button type="button"
                                id="importPopupToggle"
                                class="btn-secondary"
                                aria-haspopup="true"
                                aria-expanded="false">
                            Import Excel
                        </button>

                        <div id="importPopup" class="import-popup" aria-hidden="true">
                            <p class="import-popup-title">Import from Excel</p>
                            <p class="import-popup-subtitle">Choose one to upload excel file.</p>

                            <form id="importExcelForm"
                                  th:action="@{/admin/passwords/import}"
                                  method="post"
                                  enctype="multipart/form-data">

                                <input type="file"
                                       id="importExcelFile"
                                       class="import-file-input"
                                       name="file"
                                       accept=".xlsx,.xls"
                                       hidden>

                                <button type="button"
                                        class="btn-primary popup-btn"
                                        onclick="document.getElementById('importExcelFile').click()">
                                    Upload Excel
                                </button>

                                <a href="/admin/passwords/template"
                                   class="btn-secondary popup-btn">
                                    Download Template
                                </a>

                            </form>

                        </div>

                    </div>

                    <a th:href="@{/admin/passwords/export(query=${query}, categoryId=${categoryId != null ? categoryId : 0})}"
                       class="btn-secondary"
                       target="_blank">
                        Export Excel
                    </a>

                </div>
            </div>

            <div class="table-wrap table-wrap-scroll" th:if="${entries != null and !#lists.isEmpty(entries)}">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Password</th>
                        <th>Category</th>
                        <th>Expiry Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${entries}"
                        th:classappend="${ entry.id != null and expiryDueIdStrings != null and expiryDueIdStrings.contains(#strings.toString(entry.id)) } ? 'expired-row' : ''">
                        <td th:text="${entry.title}"></td>
                        <td>
                            <button type="button" class="username-copy-btn"
                                    th:attr="data-username=${entry.username}"
                                    title="Click to copy username"
                                    onclick="copyUsernameFromCell(this)"
                                    th:text="${entry.username}"></button>
                        </td>
                        <td th:text="${entry.email != null and !#strings.isEmpty(entry.email) ? entry.email : '—'}"></td>
                        <td th:text="${entry.mobileNumber != null and !#strings.isEmpty(entry.mobileNumber) ? entry.mobileNumber : '—'}"></td>
                        <td class="password-cell">
                            <button type="button" class="password-reveal-btn"
                                    title="Click to show password and copy to clipboard"
                                    th:onclick="|revealAndCopyPassword(this, ${entry.id})|">
                                <span class="password-mask">••••••••</span>
                                <span class="password-plain" hidden></span>
                            </button>
                            <span th:id="${'password-' + entry.id}" th:text="${entry.password}" hidden></span>
                        </td>
                        <td th:text="${entry.category != null ? entry.category.name : '-'}"></td>
                        <td th:classappend="${ entry.id != null and expiryDueIdStrings != null and expiryDueIdStrings.contains(#strings.toString(entry.id)) } ? 'expired-date' : ''"
                            th:text="${entry.expiryDate != null ? #temporals.format(entry.expiryDate, 'yyyy-MM-dd') : '-'}"></td>
                        <td>
                            <div class="row-actions">
                                <a th:href="@{'/admin/passwords/' + ${entry.id} + '/edit'}"
                                   class="table-action-btn"
                                   aria-label="Edit">
                                    <i class="fa-solid fa-pen" aria-hidden="true"></i>
                                    <span class="table-action-tooltip">Edit</span>
                                    <span class="sr-only">Edit</span>
                                </a>
                                <button type="button"
                                        class="table-action-btn"
                                        aria-label="Users"
                                        th:attr="data-entry-title=${entry.title},data-users=${entryUsersJoined[entry.id]}"
                                        onclick="openUsersModal(this)">
                                    <i class="fa-solid fa-users" aria-hidden="true"></i>
                                    <span class="table-action-tooltip">Users</span>
                                    <span class="sr-only">Users</span>
                                </button>
                                <form th:action="@{'/admin/passwords/' + ${entry.id} + '/delete'}" method="post"
                                      onsubmit="return confirm('Delete this password entry?');">
                                    <button type="submit"
                                            class="table-action-btn table-action-btn-danger"
                                            aria-label="Delete">
                                        <i class="fa-solid fa-trash" aria-hidden="true"></i>
                                        <span class="table-action-tooltip">Delete</span>
                                        <span class="sr-only">Delete</span>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="~{fragments/pagination :: bar(
                prevUrl = ${currentPage != null and currentPage > 0}
                    ? @{/admin/passwords(page=${currentPage - 1}, size=${size}, query=${query}, categoryId=${categoryId})}
                    : null,
                nextUrl = ${currentPage != null and totalPages != null and currentPage < totalPages - 1}
                    ? @{/admin/passwords(page=${currentPage + 1}, size=${size}, query=${query}, categoryId=${categoryId})}
                    : null,
                currentPage = ${currentPage},
                totalPages = ${totalPages},
                totalElements = ${totalElements},
                itemLabel = 'entries'
            )}"></div>

            <div th:if="${entries == null or #lists.isEmpty(entries)}" style="text-align:center;">
                <p>No password entries found.</p>
            </div>
        </section>
        <div id="usersViewModalBackdrop" class="users-modal-backdrop" onclick="closeUsersModal()"></div>
        <div id="usersViewModal" class="users-modal"><h3 id="usersViewModalTitle" class="users-modal-title">Users with
            access</h3>
            <div id="usersViewModalList" class="users-modal-list"></div>
            <div class="users-modal-actions">
                <button type="button" class="btn-secondary" onclick="closeUsersModal()">Close</button>
            </div>



    </div>
</div>
<script>
    function openUsersModal(button) {
        var backdrop = document.getElementById('usersViewModalBackdrop');
        var modal = document.getElementById('usersViewModal');
        var list = document.getElementById('usersViewModalList');
        var title = document.getElementById('usersViewModalTitle');
        if (!backdrop || !modal || !list || !title) return;

        var entryTitle = '';
        var usersRaw = '';

        if (button) {
            entryTitle = (button.getAttribute('data-entry-title') || '').trim();
            usersRaw = (button.getAttribute('data-users') || '').trim();
        }

        // Populate modal list
        list.innerHTML = '';
        var labels = usersRaw ? usersRaw.split('||').map(function (s) { return s.trim(); }).filter(Boolean) : [];

        if (labels.length === 0) {
            var empty = document.createElement('div');
            empty.className = 'user-empty-note';
            empty.textContent = 'No users have access to this entry.';
            list.appendChild(empty);
        } else {
            labels.forEach(function (label) {
                var item = document.createElement('div');
                item.className = 'users-modal-item';
                item.textContent = label;
                list.appendChild(item);
            });
        }

        // Optional title tweak (keeps existing text if no entryTitle)
        if (entryTitle) {
            title.textContent = 'Users with access for: ' + entryTitle;
        }

        backdrop.style.display = 'block';
        modal.style.display = 'block';
        modal.setAttribute('aria-hidden', 'false');
    }

    function closeUsersModal() {
        var backdrop = document.getElementById('usersViewModalBackdrop');
        var modal = document.getElementById('usersViewModal');
        var title = document.getElementById('usersViewModalTitle');
        if (backdrop) backdrop.style.display = 'none';
        if (modal) modal.style.display = 'none';
        if (modal) modal.setAttribute('aria-hidden', 'true');
        if (title) title.textContent = 'Users with access';
    }

    (function () {
        function initImportPopup() {
            var wrapper = document.getElementById('importPopupWrapper');
            var toggle = document.getElementById('importPopupToggle');
            var popup = document.getElementById('importPopup');
            var fileInput = document.getElementById('importExcelFile');
            var form = document.getElementById('importExcelForm');

            if (!wrapper || !toggle || !popup || !fileInput || !form) return;
            if (wrapper.dataset.importPopupInit === 'true') return;
            wrapper.dataset.importPopupInit = 'true';

            function closePopup() {
                popup.style.display = 'none';
                popup.setAttribute('aria-hidden', 'true');
                toggle.setAttribute('aria-expanded', 'false');
            }

            function openPopup() {
                popup.style.display = 'flex';
                popup.setAttribute('aria-hidden', 'false');
                toggle.setAttribute('aria-expanded', 'true');
            }

            toggle.addEventListener('click', function () {
                if (popup.style.display === 'flex') {
                    closePopup();
                    return;
                }
                openPopup();
            });

            document.addEventListener('click', function (event) {
                if (!wrapper.contains(event.target)) {
                    closePopup();
                }
            });

            fileInput.addEventListener('change', function () {
                if (fileInput.files && fileInput.files.length > 0) {
                    closePopup();
                    form.submit();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initImportPopup);
        document.addEventListener('htmx:afterSwap', initImportPopup);
    })();
</script>
<script th:replace="~{fragments/password-reveal :: passwordRevealScript}"></script>
</html>
