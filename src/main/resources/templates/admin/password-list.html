<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead('Admin Password Entries')"></head>

<div id="content" th:fragment="content">

    <div class="dashboard-container admin-passwords-page">

        <header class="page-header">
            <h1>Manage Password Entries</h1>
            <p>Search, manage, and assign password records.</p>
        </header>

        <section class="card">
            <form hx-get="/admin/passwords/fragments"
                  hx-target="#content"
                  hx-push-url="true"
                  class="toolbar">

                <input type="hidden"
                       name="categoryId"
                       th:value="${categoryId != null ? categoryId : 0}" />

                <input class="toolbar-input"
                       type="text"
                       name="query"
                       placeholder="Search by title or description"
                       th:value="${query}" />

                <button type="submit" class="btn-primary">Search</button>

                <a hx-get="/admin/passwords/fragments"
                   hx-target="#content"
                   class="btn-secondary">
                    Reset
                </a>

                <a href="/admin/passwords/new"
                   class="btn-primary">
                    Create new
                </a>

            </form>
        </section>

        <section class="card" style="margin-top: var(--wa-space-m);">

            <div style="display:flex; justify-content:flex-start; align-items:center; margin-bottom: var(--wa-space-s);">
                <form hx-get="/admin/passwords/fragments"
                      hx-target="#content"
                      hx-push-url="true"
                      class="toolbar">
                    <input type="hidden" name="query" th:value="${query}" />

                    <span style="width: 100%; text-align: center; font-size: var(--wa-font-size-1xs); color: var(--wa-color-text-quiet);">
                        Filter by category
                    </span>

                    <select class="toolbar-input"
                            name="categoryId"
                            style="width: 180px; min-width: 180px; max-width: 180px; flex: 0 0 180px; border-radius: var(--wa-border-radius-m); appearance: none; -webkit-appearance: none; -moz-appearance: none;"
                             onchange="this.form.requestSubmit()">
                        <option value="0" th:selected="${categoryId == null}">All categories</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${categoryId != null and categoryId == category.id}">
                        </option>
                    </select>
                </form>
            </div>

            <div class="table-wrap"
                 th:if="${entries != null and !#lists.isEmpty(entries)}">

                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Username</th>
                        <th>Category</th>
                        <th>Expiry Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="entry : ${entries}">
                        <td th:text="${entry.title}"></td>
                        <td th:text="${entry.username}"></td>
                        <td th:text="${entry.category != null ? entry.category.name : '-'}"></td>
                        <td th:text="${entry.expiryDate != null ? #temporals.format(entry.expiryDate, 'yyyy-MM-dd') : '-'}"></td>

                        <td>
                            <div class="row-actions">

                                <a th:href="@{'/admin/passwords/' + ${entry.id} + '/edit'}"
                                   class="btn-secondary">
                                    Edit
                                </a>

                                <button type="submit" class="btn-secondary" 
                                        th:attr="data-entry-title=${entry.title},
                                                 data-users=${entryUsers[entry.id] != null ? #strings.listJoin(entryUsers[entry.id], '||') : ''}"
                                        onclick="openUsersModal(this)">
                                    Users
                                </button>

                                <form th:action="@{'/admin/passwords/' + ${entry.id} + '/delete'}"
                                      method="post"
                                      onsubmit="return confirm('Delete this password entry?');">
                                    <button type="submit" class="btn-danger-soft">Delete</button>
                                </form>

                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${entries == null or #lists.isEmpty(entries)}"
                 style="text-align:center;">
                <p>No password entries found.</p>
            </div>

        </section>

        <div id="usersViewModalBackdrop" class="users-modal-backdrop" onclick="closeUsersModal()"></div>
        <div id="usersViewModal" class="users-modal">
            <h3 id="usersViewModalTitle" class="users-modal-title">Users with access</h3>
            <div id="usersViewModalList" class="users-modal-list"></div>
            <div class="users-modal-actions">
                <button type="button" class="btn-secondary" onclick="closeUsersModal()">Close</button>
            </div>
        </div>

    </div>

</div>
<script>
    function openUsersModal(button) {
        const modal = document.getElementById('usersViewModal');
        const backdrop = document.getElementById('usersViewModalBackdrop');
        const titleEl = document.getElementById('usersViewModalTitle');
        const listEl = document.getElementById('usersViewModalList');
        if (!modal || !backdrop || !titleEl || !listEl || !button) return;

        const entryTitle = button.getAttribute('data-entry-title') || 'Password Entry';
        const usersRaw = button.getAttribute('data-users') || '';
        const users = usersRaw
            .split('||')
            .map(item => item.trim())
            .filter(item => item.length > 0);

        titleEl.textContent = `Users with access - ${entryTitle}`;
        listEl.innerHTML = '';

        if (users.length === 0) {
            const empty = document.createElement('p');
            empty.className = 'user-empty-note';
            empty.textContent = 'No users assigned to this entry.';
            listEl.appendChild(empty);
        } else {
            users.forEach(userLabel => {
                const row = document.createElement('div');
                row.className = 'users-modal-item';
                row.textContent = userLabel;
                listEl.appendChild(row);
            });
        }

        modal.style.display = 'block';
        backdrop.style.display = 'block';
    }

    function closeUsersModal() {
        const modal = document.getElementById('usersViewModal');
        const backdrop = document.getElementById('usersViewModalBackdrop');
        if (!modal || !backdrop) return;
        modal.style.display = 'none';
        backdrop.style.display = 'none';
    }

</script>
</html>
