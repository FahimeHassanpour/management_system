<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      class="wa-theme-awesome wa-palette-bright wa-brand-blue">
<head th:replace="~{fragments/head :: commonHead('Admin Password Entries')}"></head>
<div id="content" th:fragment="content">
    <div th:if="${successMessage}" class="alert alert-success"><span th:text="${successMessage}"></span></div>
    <div th:if="${errorMessage}" class="alert alert-danger"><span th:text="${errorMessage}"></span></div>
    <div th:replace="~{fragments/password-reveal :: copyToast}"></div>
    <div class="dashboard-container admin-passwords-page">
        <header class="page-header"><h1>Manage Password Entries</h1>
            <p>Search, manage, and assign password records.</p></header>
        <section class="card">
            <div class="toolbar">
                <form hx-get="/admin/passwords/fragments" hx-target="#content" hx-push-url="true" class="toolbar">
                    <input type="hidden" name="page" value="0"/>
                    <input type="hidden" name="size" th:value="${size != null ? size : 10}"/>
                    <input type="hidden" name="categoryId" th:value="${categoryId != null ? categoryId : 0}"/>
                    <input class="toolbar-input toolbar-search-input" type="text" name="query"
                           placeholder="Search by title or description"
                           th:value="${query}"/>
                    <button type="submit" class="btn-primary">Search</button>
                    <a class="btn-secondary"
                       th:attr="hx-get=@{/admin/passwords/fragments(page=0,size=${size != null ? size : 10},categoryId=0,query='')},hx-target='#content',hx-push-url='true'">
                        Reset
                    </a>
                </form>


            </div>
        </section>
        <section class="card" style="margin-top: var(--wa-space-s);">
            <div class="passwords-table-toolbar">

                <form hx-get="/admin/passwords/fragments"
                      hx-target="#content"
                      hx-push-url="true"
                      class="toolbar passwords-filter-form">
                    <input type="hidden" name="page" value="0"/>
                    <input type="hidden" name="size" th:value="${size != null ? size : 10}"/>
                    <input type="hidden" name="query" th:value="${query}"/>
                    <label class="passwords-filter-label">Filter by category</label>
                    <select class="toolbar-input toolbar-select-category"
                            name="categoryId"
                            onchange="this.form.requestSubmit()">
                        <option value="0" th:selected="${categoryId == null}">All categories</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${categoryId != null and categoryId == category.id}">
                        </option>
                    </select>
                </form>

                <div class="passwords-actions">
                    <a href="/admin/passwords/new" class="btn-primary">Create new</a>

                    <button type="button"
                            class="btn-secondary"
                            onclick="openImportModal()">
                        Import Excel
                    </button>

                    <a th:href="@{/admin/passwords/export(query=${query}, categoryId=${categoryId != null ? categoryId : 0})}"
                       class="btn-secondary"
                       target="_blank">
                        Export Excel
                    </a>
                </div>
            </div>

            <div class="table-wrap table-wrap-scroll" th:if="${entries != null and !#lists.isEmpty(entries)}">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Category</th>
                        <th>Expiry Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${entries}"
                        th:classappend="${ entry.id != null and expiryDueIdStrings != null and expiryDueIdStrings.contains(#strings.toString(entry.id)) } ? 'expired-row' : ''">
                        <td th:text="${entry.title}"></td>
                        <td>
                            <button type="button" class="username-copy-btn"
                                    th:attr="data-username=${entry.username}"
                                    title="Click to copy username"
                                    onclick="copyUsernameFromCell(this)"
                                    th:text="${entry.username}"></button>
                        </td>
                        <td class="password-cell">
                            <button type="button" class="password-reveal-btn"
                                    title="Click to show password and copy to clipboard"
                                    th:onclick="|revealAndCopyPassword(this, ${entry.id})|">
                                <span class="password-mask">••••••••</span>
                                <span class="password-plain" hidden></span>
                            </button>
                            <span th:id="${'password-' + entry.id}" th:text="${entry.password}" hidden></span>
                        </td>
                        <td th:text="${entry.category != null ? entry.category.name : '-'}"></td>
                        <td th:classappend="${ entry.id != null and expiryDueIdStrings != null and expiryDueIdStrings.contains(#strings.toString(entry.id)) } ? 'expired-date' : ''"
                            th:text="${entry.expiryDate != null ? #temporals.format(entry.expiryDate, 'yyyy-MM-dd') : '-'}"></td>
                        <td>
                            <div class="row-actions">
                                <a th:href="@{'/admin/passwords/' + ${entry.id} + '/edit'}" class="btn-secondary">
                                    Edit </a>
                                <button type="submit" class="btn-secondary"
                                        th:attr="data-entry-title=${entry.title},data-users=${entryUsersJoined[entry.id]}"
                                        onclick="openUsersModal(this)"> Users
                                </button>
                                <form th:action="@{'/admin/passwords/' + ${entry.id} + '/delete'}" method="post"
                                      onsubmit="return confirm('Delete this password entry?');">
                                    <button type="submit" class="btn-danger-soft">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="~{fragments/pagination :: bar(
                prevUrl = ${currentPage != null and currentPage > 0}
                    ? @{/admin/passwords(page=${currentPage - 1}, size=${size}, query=${query}, categoryId=${categoryId})}
                    : null,
                nextUrl = ${currentPage != null and totalPages != null and currentPage < totalPages - 1}
                    ? @{/admin/passwords(page=${currentPage + 1}, size=${size}, query=${query}, categoryId=${categoryId})}
                    : null,
                currentPage = ${currentPage},
                totalPages = ${totalPages},
                totalElements = ${totalElements},
                itemLabel = 'entries'
            )}"></div>

            <div th:if="${entries == null or #lists.isEmpty(entries)}" style="text-align:center;">
                <p>No password entries found.</p>
            </div>
        </section>
        <div id="usersViewModalBackdrop" class="users-modal-backdrop" onclick="closeUsersModal()"></div>
        <div id="usersViewModal" class="users-modal"><h3 id="usersViewModalTitle" class="users-modal-title">Users with
            access</h3>
            <div id="usersViewModalList" class="users-modal-list"></div>
            <div class="users-modal-actions">
                <button type="button" class="btn-secondary" onclick="closeUsersModal()">Close</button>
            </div>
        </div>

        <!-- Import Modal -->
        <div id="importModal" class="modal">

            <div class="modal-content">

                <h3>Import Passwords</h3>

                <form id="importExcelForm"
                      th:action="@{/admin/passwords/import}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="file"
                           id="importExcelFile"
                           name="file"
                           accept=".xlsx,.xls"
                           style="display:none;">

                    <button type="button"
                            class="btn-primary"
                            onclick="document.getElementById('importExcelFile').click()">
                        Select Excel
                    </button>

                    <a href="/admin/passwords/template"
                       class="btn-secondary">
                        Download Excel Template
                    </a>

                    <button type="button"
                            class="btn-danger-soft"
                            onclick="closeImportModal()">
                        Close
                    </button>

                </form>

            </div>

        </div>


    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {

        var fileInput = document.getElementById('importExcelFile');
        var form = document.getElementById('importExcelForm');

        if (!fileInput || !form) return;

        fileInput.addEventListener('change', function () {

            if (fileInput.files.length > 0) {

                form.submit();

                closeImportModal();
            }

        });

    });

function openUsersModal(button) {
    const modal = document.getElementById('usersViewModal');
    const backdrop = document.getElementById('usersViewModalBackdrop');
    const titleEl = document.getElementById('usersViewModalTitle');
    const listEl = document.getElementById('usersViewModalList');
    if (!modal || !backdrop || !titleEl || !listEl || !button) return;
    const entryTitle = button.getAttribute('data-entry-title') || 'Password Entry';
    const usersRaw = button.getAttribute('data-users') || '';
    const users = usersRaw.split('||').map(item => item.trim()).filter(item => item.length > 0);
    titleEl.textContent = 'Users with access — ' + entryTitle;
    listEl.innerHTML = '';
    if (users.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'user-empty-note';
        empty.textContent = 'No users assigned to this entry.';
        listEl.appendChild(empty);
    } else {
        users.forEach(userLabel => {
            const row = document.createElement('div');
            row.className = 'users-modal-item';
            row.textContent = userLabel;
            listEl.appendChild(row);
        });
    }
    modal.style.display = 'block';
    backdrop.style.display = 'block';
}

function closeUsersModal() {
    const modal = document.getElementById('usersViewModal');
    const backdrop = document.getElementById('usersViewModalBackdrop');
    if (!modal || !backdrop) return;
    modal.style.display = 'none';
    backdrop.style.display = 'none';
}

function openImportModal() {
    document.getElementById('importModal').style.display = 'flex';
}

function closeImportModal() {
    document.getElementById('importModal').style.display = 'none';
}

</script>
<script th:replace="~{fragments/password-reveal :: passwordRevealScript}"></script>
</html>
