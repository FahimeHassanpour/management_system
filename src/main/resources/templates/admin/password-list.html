<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead('Admin Password Entries')"></head>

<body class="dashboard-body">
<div class="dashboard-container admin-passwords-page">

    <header class="page-header">
        <h1>Admin Password Entries</h1>
        <p>Search, manage, and assign password records.</p>
    </header>

    <section class="card">
        <form action="/admin/passwords" method="get" class="toolbar">
            <input class="toolbar-input"
                   type="text"
                   name="query"
                   placeholder="Search by title or description"
                   th:value="${query}" />
            <button type="submit" class="btn-primary" style="width:auto; margin:0;">Search</button>
            <a href="/admin/passwords/new" class="card-link">Create new</a>
            <a href="/admin/passwords" class="btn-secondary">Reset</a>
        </form>
    </section>

    <section class="card" style="margin-top: var(--wa-space-m);">
        <div class="table-wrap" th:if="${entries != null and !#lists.isEmpty(entries)}">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Username</th>
                    <th>Category</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${entries}">
                    <td th:text="${entry.title}">Title</td>
                    <td th:text="${entry.username}">Username</td>
                    <td th:text="${entry.category != null ? entry.category.name : '-'}">Category</td>
                    <td>
                        <div class="row-actions">
                            <a th:href="@{'/admin/passwords/' + ${entry.id} + '/edit'}" class="btn-secondary">Edit</a>
                            <a th:href="@{'/admin/passwords/' + ${entry.id} + '/assignments'}" class="btn-secondary">Assign</a>
                            <form th:action="@{'/admin/passwords/' + ${entry.id} + '/delete'}"
                                  method="post"
                                  style="display:inline"
                                  onsubmit="return confirm('Delete this password entry?');">
                                <button type="submit" class="btn-danger-soft">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${entries == null or #lists.isEmpty(entries)}"
             style="text-align:center; padding: var(--wa-space-xl) var(--wa-space-m); color: var(--wa-color-text-quiet);">
            <p>No password entries found.</p>
            <a href="/admin/passwords/new" class="card-link">Create first entry</a>
        </div>
    </section>

    <footer class="dashboard-footer">
        <a href="/dashboard" class="card-link">Back to dashboard</a>
    </footer>
</div>
</body>
</html>
