<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: commonHead('Admin Passwords')"></head>
<body>
<h2>Admin Password Entries</h2>

<form action="/admin/passwords" method="get">
    <input type="text" name="query" placeholder="Search by title or description" th:value="${query}"/>
    <button type="submit">Search</button>
    <a href="/admin/passwords/new">Create new</a>
    <a href="/admin/users">Manage users/roles</a>
</form>

<table border="1" cellpadding="8">
    <thead>
    <tr>
        <th>Title</th>
        <th>Username</th>
        <th>Category</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry : ${entries}">
        <td th:text="${entry.title}">Title</td>
        <td th:text="${entry.username}">Username</td>
        <td th:text="${entry.category != null ? entry.category.name : '-'}">Category</td>
        <td>
            <a th:href="@{'/admin/passwords/' + ${entry.id} + '/edit'}">Edit</a>
            <a th:href="@{'/admin/passwords/' + ${entry.id} + '/assignments'}">Assign</a>
            <form th:action="@{'/admin/passwords/' + ${entry.id} + '/delete'}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<p><a href="/dashboard">Back to dashboard</a></p>
</body>
</html>
