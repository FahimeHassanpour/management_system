<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead('Invite user')"></head>
<body class="dashboard-body">
<h1>Invite by email</h1>
<p th:if="${param.sent}" style="color: green;">Invitation sent.</p>
<form method="post" th:action="@{/admin/invitations}">
    <label>Email <input type="email" name="email" required /></label>
    <button type="submit">Send invitation</button>
</form>
<p><a th:href="@{/admin/users}">Back to users</a></p>
</body>
</html>
