<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead(#{login.title})"></head>

<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-vault"></i>
            <h2 th:text="#{login.header}">Sign in to Password Vault</h2>
            <p class="subtitle" th:text="#{login.subtitle}">Use your company account credentials</p>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span th:text="#{login.error.invalid}">Invalid username or password.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fa-solid fa-circle-check"></i>
            <span th:text="#{login.logout.success}">You have been logged out.</span>
        </div>

        <form action="/login" method="post" class="login-form">
            <div class="form-group">
                <label for="username">
                    <i class="fa-solid fa-user"></i>
                    <span th:text="#{login.username}">Username</span>
                </label>
                <input id="username" name="username" type="text" required
                       placeholder="your.username"/>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fa-solid fa-lock"></i>
                    <span th:text="#{login.password}">Password</span>
                </label>
                <input id="password" name="password" type="password" required
                       placeholder="••••••••"/>
            </div>

            <button type="submit" class="btn-primary">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span th:text="#{login.button}">Login</span>
            </button>
        </form>
    </div>
</div>
</body>
