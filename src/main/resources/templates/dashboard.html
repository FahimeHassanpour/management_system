<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="wa-dark">
<head th:replace="fragments/head :: commonHead(#{dashboard.title})"></head>

<body class="dashboard-body dashboard-shell">
<div class="app-layout">
    <div th:replace="fragments/sidebar :: sidebar('passwords')"></div>

    <main class="main-content">
        <iframe name="contentFrame"
                class="content-frame"
                th:src="${#authorization.expression('hasAnyRole(''MANAGER'',''ADMIN'')')} ? @{/admin/passwords} : @{/my/passwords}"
                title="Content area">
        </iframe>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const links = document.querySelectorAll('.menu .nav-link');
        const frame = document.querySelector('iframe[name="contentFrame"]');
        if (!frame || links.length === 0) return;

        links.forEach(link => {
            link.addEventListener('click', function (event) {
                event.preventDefault();
                const href = this.getAttribute('href');
                if (href) frame.setAttribute('src', href);
                links.forEach(item => item.classList.remove('active'));
                this.classList.add('active');
            });
        });
    });
</script>
</body>
</html>
