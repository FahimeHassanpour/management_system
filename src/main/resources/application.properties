# Enable Hibernate Envers
spring.jpa.properties.hibernate.integration.envers.enabled=true

# Show SQL in console so you can see the "new changes" being saved
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.envers=DEBUG

# Customizing table names (optional)
spring.jpa.properties.hibernate.envers.audit_table_suffix=_aud

# Ensure Envers is actually looking for your classes
spring.jpa.properties.hibernate.envers.auto_register_envers_listeners=true

spring.flyway.repair-on-migrate=true